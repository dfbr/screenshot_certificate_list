name: Screenshot Certificate List

on:
  schedule:
    - cron: '0 5 * * *'    # Daily at 05:00 UTC
  workflow_dispatch:
    inputs:
      max_runs:
        description: 'Maximum runs to keep per domain (default: 10)'
        required: false
        default: '10'
      max_domains:
        description: 'Maximum domains to screenshot per run, 0 = unlimited (default: 0)'
        required: false
        default: '0'
      concurrency:
        description: 'Number of screenshots to take in parallel (default: 24)'
        required: false
        default: '24'
      domain_concurrency:
        description: 'Number of domains to process in parallel on a single runner (default: 4)'
        required: false
        default: '4'
      crtsh_timeout:
        description: 'Request timeout in seconds for crt.sh queries (default: 30)'
        required: false
        default: '30'
      crtsh_max_retries:
        description: 'Maximum retry attempts for crt.sh queries (default: 20)'
        required: false
        default: '20'
      lookback:
        description: 'Lookback runs for notifications (0 = all previous runs, default: 0)'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  # ── 1. Read domains.txt and produce the matrix ─────────────────────────────
  setup:
    name: Read domain list
    runs-on: ubuntu-latest
    outputs:
      domains: ${{ steps.read.outputs.domains }}
    steps:
      - uses: actions/checkout@v5

      - name: Install YAML parser
        run: python3 -m pip install --quiet pyyaml

      - id: read
        name: Parse domains.yml / DOMAINS_YML / domains.txt
        env:
          DOMAINS_YML: ${{ secrets.DOMAINS_YML }}
        run: |
          DOMAINS=$(python3 - <<'EOF'
          import os, json, base64
          import yaml


          def domains_from_yaml_text(raw):
              """Extract domains from a YAML mapping, excluding the 'default' key."""
              try:
                  data = yaml.safe_load(raw) or {}
              except Exception:
                  return []
              if not isinstance(data, dict):
                  return []
              out = []
              for key in data.keys():
                  if isinstance(key, str):
                      key = key.strip()
                      if key and key != 'default':
                          out.append(key)
              return out


          lines = []

          # 1) Prefer a checked-in domains.yml mapping (keys are domain names)
          if os.path.exists('domains.yml'):
              try:
                  with open('domains.yml', 'r', encoding='utf-8') as fh:
                      lines = domains_from_yaml_text(fh.read())
              except Exception:
                  lines = []

          # 2) Fallback to DOMAINS_YML secret (base64-encoded or raw YAML)
          if not lines and os.environ.get('DOMAINS_YML'):
              raw_env = os.environ.get('DOMAINS_YML') or ''
              try:
                  raw = base64.b64decode(raw_env).decode('utf-8')
              except Exception:
                  raw = raw_env
              lines = domains_from_yaml_text(raw)

          # 3) Finally fallback to domains.txt
          if not lines and os.path.exists('domains.txt'):
              with open('domains.txt', 'r', encoding='utf-8') as fh:
                  for l in fh:
                      l = l.strip()
                      if not l or l.startswith('#'):
                          continue
                      lines.append(l)

          print(json.dumps(lines))
          EOF
          )
          echo "domains=$DOMAINS" >> "$GITHUB_OUTPUT"

  # ── 2. Process all domains and commit on a single runner ───────────────────
  process_and_commit:
    name: Process and commit results
    needs: setup
    if: needs.setup.outputs.domains != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run domain processing (parallel)
        env:
          DOMAINS_JSON: ${{ needs.setup.outputs.domains }}
          DOMAIN_CONCURRENCY: ${{ github.event.inputs.domain_concurrency || '4' }}
          MAX_RUNS: ${{ github.event.inputs.max_runs || '10' }}
          MAX_DOMAINS: ${{ github.event.inputs.max_domains || '0' }}
          SCREENSHOT_CONCURRENCY: ${{ github.event.inputs.concurrency || '12' }}
          CRTSH_TIMEOUT: ${{ github.event.inputs.crtsh_timeout || '30' }}
          CRTSH_MAX_RETRIES: ${{ github.event.inputs.crtsh_max_retries || '20' }}
        run: |
          python3 - <<'EOF'
          import json
          import os
          import subprocess
          import sys
          from concurrent.futures import ThreadPoolExecutor, as_completed

          domains = json.loads(os.environ.get("DOMAINS_JSON", "[]"))
          if not domains:
              print("No domains to process")
              raise SystemExit(0)

          workers = max(1, int(os.environ.get("DOMAIN_CONCURRENCY", "4")))
          workers = min(workers, len(domains))
          print(f"Processing {len(domains)} domain(s) with domain_concurrency={workers}")

          failures = []

          def run_one(domain: str):
              cmd = [
                  sys.executable,
                  "scripts/run_domain.py",
                  domain,
                  "--results-dir",
                  "results",
                  "--max-runs",
                  os.environ["MAX_RUNS"],
                  "--max-domains",
                  os.environ["MAX_DOMAINS"],
                  "--concurrency",
                  os.environ["SCREENSHOT_CONCURRENCY"],
                  "--crtsh-timeout",
                  os.environ["CRTSH_TIMEOUT"],
                  "--crtsh-max-retries",
                  os.environ["CRTSH_MAX_RETRIES"],
              ]
              proc = subprocess.run(cmd, text=True, capture_output=True)
              return domain, proc.returncode, proc.stdout, proc.stderr

          with ThreadPoolExecutor(max_workers=workers) as executor:
              futures = [executor.submit(run_one, domain) for domain in domains]
              for future in as_completed(futures):
                  domain, rc, out, err = future.result()
                  print(f"\n=== Domain: {domain} (exit={rc}) ===")
                  if out:
                      print(out.rstrip())
                  if err:
                      print(err.rstrip(), file=sys.stderr)
                  if rc != 0:
                      failures.append(domain)

          if failures:
              print(
                  "WARNING: one or more domains failed (continuing so partial results can be committed): "
                  + ", ".join(sorted(failures)),
                  file=sys.stderr,
              )
          EOF

      - name: Notify new responsive domains
        if: always()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DOMAINS_YML: ${{ secrets.DOMAINS_YML }}
        run: |
          python3 scripts/notify_new_domains.py results --lookback "${{ github.event.inputs.lookback || '0' }}"

      - name: Build Pages site (update README + generate docs/)
        run: python3 scripts/update_readme.py results --docs-dir docs

      - name: Commit and push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add results/ docs/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: update screenshots $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
