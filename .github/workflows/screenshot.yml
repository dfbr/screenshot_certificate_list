name: Screenshot Certificate List

on:
  schedule:
    - cron: '0 5 * * *'    # Daily at 05:00 UTC
  workflow_dispatch:
    inputs:
      max_runs:
        description: 'Maximum runs to keep per domain (default: 10)'
        required: false
        default: '10'
      max_domains:
        description: 'Maximum domains to screenshot per run, 0 = unlimited (default: 0)'
        required: false
        default: '0'
      concurrency:
        description: 'Number of screenshots to take in parallel (default: 24)'
        required: false
        default: '24'
      crtsh_timeout:
        description: 'Request timeout in seconds for crt.sh queries (default: 30)'
        required: false
        default: '30'
      crtsh_max_retries:
        description: 'Maximum retry attempts for crt.sh queries (default: 20)'
        required: false
        default: '20'
      lookback:
        description: 'Lookback runs for notifications (0 = all previous runs, default: 0)'
        required: false
        default: '0'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── 1. Read domains.txt and produce the matrix ─────────────────────────────
  setup:
    name: Read domain list
    runs-on: ubuntu-latest
    outputs:
      domains: ${{ steps.read.outputs.domains }}
    steps:
      - uses: actions/checkout@v5

      - id: read
        name: Parse domains.yml / DOMAINS_YML / domains.txt
        env:
          DOMAINS_YML: ${{ secrets.DOMAINS_YML }}
        run: |
          DOMAINS=$(python3 - <<'EOF'
          import os, json, re, base64
          lines = []

          # 1) Prefer a checked-in domains.yml mapping (keys are domain names)
          if os.path.exists('domains.yml'):
              try:
                  with open('domains.yml', 'r', encoding='utf-8') as fh:
                      for l in fh:
                          m = re.match(r'^\s*([^:\s][^:]*)\s*:', l)
                          if m:
                              key = m.group(1).strip()
                              if key and key != 'default':
                                  lines.append(key)
              except Exception:
                  lines = []

          # 2) Fallback to DOMAINS_YML secret (base64-encoded or raw YAML)
          if not lines and os.environ.get('DOMAINS_YML'):
              raw_env = os.environ.get('DOMAINS_YML') or ''
              try:
                  raw = base64.b64decode(raw_env).decode('utf-8')
              except Exception:
                  raw = raw_env
              for l in raw.splitlines():
                  m = re.match(r'^\s*([^:\s][^:]*)\s*:', l)
                  if m:
                      key = m.group(1).strip()
                      if key and key != 'default':
                          lines.append(key)

          # 3) Finally fallback to domains.txt
          if not lines and os.path.exists('domains.txt'):
              with open('domains.txt', 'r', encoding='utf-8') as fh:
                  for l in fh:
                      l = l.strip()
                      if not l or l.startswith('#'):
                          continue
                      lines.append(l)

          print(json.dumps(lines))
          EOF
          )
          echo "domains=$DOMAINS" >> "$GITHUB_OUTPUT"

  # ── 2. Per-domain: query crt.sh + take screenshots ─────────────────────────
  process:
    name: Process ${{ matrix.domain }}
    needs: setup
    if: needs.setup.outputs.domains != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        domain: ${{ fromJSON(needs.setup.outputs.domains) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run domain processing
        run: |
          python3 scripts/run_domain.py "${{ matrix.domain }}" \
            --results-dir results \
            --max-runs "${{ github.event.inputs.max_runs || '5' }}" \
            --max-domains "${{ github.event.inputs.max_domains || '0' }}" \
            --concurrency "${{ github.event.inputs.concurrency || '12' }}" \
            --crtsh-timeout "${{ github.event.inputs.crtsh_timeout || '30' }}" \
            --crtsh-max-retries "${{ github.event.inputs.crtsh_max_retries || '20' }}"

      - name: Upload results artifact
        uses: actions/upload-artifact@v7
        with:
          name: domain-${{ matrix.domain }}
          path: results/${{ matrix.domain }}/
          if-no-files-found: warn

  # ── 3. Collect artifacts, update README, commit ────────────────────────────
  commit:
    name: Commit results
    needs: [setup, process]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download domain artifacts
        uses: actions/download-artifact@v7
        with:
          path: /tmp/artifacts
          pattern: 'domain-*'
        continue-on-error: true

      - name: Merge artifacts into results/
        run: |
          if [ ! -d /tmp/artifacts ]; then
            echo "No artifacts found – nothing to merge"
            exit 0
          fi
          for artifact_dir in /tmp/artifacts/domain-*/; do
            [ -d "$artifact_dir" ] || continue
            domain=$(basename "$artifact_dir" | sed 's/^domain-//')
            echo "Merging: $domain"
            rm -rf "results/$domain"
            mkdir -p "results/$domain"
            cp -r "$artifact_dir/." "results/$domain/"
          done

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Update top-level README
        run: python3 scripts/update_readme.py results

      - name: Notify new responsive domains
        if: always()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DOMAINS_YML: ${{ secrets.DOMAINS_YML }}
        run: |
          python3 scripts/notify_new_domains.py results --lookback "${{ github.event.inputs.lookback || '0' }}"

      - name: Commit and push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add results/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: update screenshots $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

  # ── 4. Deploy results/ to GitHub Pages ────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: commit
    if: always() && needs.commit.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: results/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
