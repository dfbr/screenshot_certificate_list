name: Screenshot Certificate List

on:
  schedule:
    - cron: '0 2 * * *'    # Daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      max_runs:
        description: 'Maximum runs to keep per domain (default: 5)'
        required: false
        default: '5'
      max_domains:
        description: 'Maximum domains to screenshot per run, 0 = unlimited (default: 50)'
        required: false
        default: '50'
      crtsh_timeout:
        description: 'Request timeout in seconds for crt.sh queries (default: 10)'
        required: false
        default: '10'
      crtsh_max_retries:
        description: 'Maximum retry attempts for crt.sh queries (default: 10)'
        required: false
        default: '10'

permissions:
  contents: write

jobs:
  # ── 1. Read domains.txt and produce the matrix ─────────────────────────────
  setup:
    name: Read domain list
    runs-on: ubuntu-latest
    outputs:
      domains: ${{ steps.read.outputs.domains }}
    steps:
      - uses: actions/checkout@v5

      - id: read
        name: Parse domains.txt
        run: |
          DOMAINS=$(python3 - <<'EOF'
          import json
          with open("domains.txt") as fh:
              lines = [l.strip() for l in fh if l.strip() and not l.startswith("#")]
          print(json.dumps(lines))
          EOF
          )
          echo "domains=$DOMAINS" >> "$GITHUB_OUTPUT"

  # ── 2. Per-domain: query crt.sh + take screenshots ─────────────────────────
  process:
    name: Process ${{ matrix.domain }}
    needs: setup
    if: needs.setup.outputs.domains != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        domain: ${{ fromJSON(needs.setup.outputs.domains) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run domain processing
        run: |
          python3 scripts/run_domain.py \
            "${{ matrix.domain }}" \
            results \
            "${{ github.event.inputs.max_runs || '5' }}" \
            "${{ github.event.inputs.max_domains || '50' }}" \
            "${{ github.event.inputs.crtsh_timeout || '10' }}" \
            "${{ github.event.inputs.crtsh_max_retries || '10' }}"

      - name: Upload results artifact
        uses: actions/upload-artifact@v7
        with:
          name: domain-${{ matrix.domain }}
          path: results/${{ matrix.domain }}/
          if-no-files-found: warn

  # ── 3. Collect artifacts, update README, commit ────────────────────────────
  commit:
    name: Commit results
    needs: [setup, process]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download domain artifacts
        uses: actions/download-artifact@v7
        with:
          path: /tmp/artifacts
          pattern: 'domain-*'
        continue-on-error: true

      - name: Merge artifacts into results/
        run: |
          if [ ! -d /tmp/artifacts ]; then
            echo "No artifacts found – nothing to merge"
            exit 0
          fi
          for artifact_dir in /tmp/artifacts/domain-*/; do
            [ -d "$artifact_dir" ] || continue
            domain=$(basename "$artifact_dir" | sed 's/^domain-//')
            echo "Merging: $domain"
            rm -rf "results/$domain"
            mkdir -p "results/$domain"
            cp -r "$artifact_dir/." "results/$domain/"
          done

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Update top-level README
        run: python3 scripts/update_readme.py results

      - name: Commit and push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add results/ README.md
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: update screenshots $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
