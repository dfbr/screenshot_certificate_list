<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  {%- include head.html -%}
  <body class="gallery-layout">
    {%- include header.html -%}

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }

      .gallery-layout {
        min-height: 100dvh;
      }

      .gallery-main {
        width: 100%;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      #gallery-viewport {
        position: relative;
        width: 100%;
        overflow: hidden;
        background: #ffffff;
      }

      #gallery-scale-root {
        width: 100%;
        height: 100%;
      }

      #gallery-grid {
        display: grid;
        width: 100%;
        height: 100%;
        grid-template-columns: 1fr;
        grid-template-rows: 1fr;
        gap: 0;
        padding: 0;
      }

      .gallery-item {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
      }

      .gallery-item a {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        text-decoration: none;
        color: inherit;
      }

      .gallery-item img {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 0;
        flex: 1 1 auto;
        object-fit: cover;
        background: #ffffff;
      }

      .gallery-item figcaption {
        font-size: 0.72rem;
        line-height: 1.2;
        padding: 0.2rem 0.3rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        background: rgba(255, 255, 255, 0.92);
      }

      #gallery-grid.compact .gallery-item figcaption {
        display: none;
      }
    </style>

    <main class="gallery-main" aria-label="Content">
      {{ content }}
    </main>

    <script>
      (function () {
        const viewport = document.getElementById('gallery-viewport');
        const root = document.getElementById('gallery-scale-root');
        const grid = document.getElementById('gallery-grid');
        const items = grid ? Array.from(grid.querySelectorAll('.gallery-item')) : [];

        function chooseGrid(itemCount, width, height) {
          const targetAspect = 1.5;
          let bestCols = 1;
          let bestRows = Math.max(1, itemCount);
          let bestScore = Number.POSITIVE_INFINITY;

          for (let cols = 1; cols <= itemCount; cols += 1) {
            const rows = Math.ceil(itemCount / cols);
            const cellW = width / cols;
            const cellH = height / rows;
            const aspect = cellW / Math.max(cellH, 1);
            const slotWaste = (cols * rows - itemCount) / itemCount;
            const score = Math.abs(Math.log(aspect / targetAspect)) + slotWaste * 0.08;

            if (score < bestScore) {
              bestScore = score;
              bestCols = cols;
              bestRows = rows;
            }
          }

          return { cols: bestCols, rows: bestRows };
        }

        function fitGallery() {
          if (!viewport || !root || !grid) return;

          const nav = document.querySelector('.site-header');
          const navHeight = nav ? nav.getBoundingClientRect().height : 0;
          const availableHeight = Math.max(220, window.innerHeight - navHeight);
          viewport.style.height = `${availableHeight}px`;

          const itemCount = items.length;
          if (!itemCount) {
            grid.style.gridTemplateColumns = '1fr';
            grid.style.gridTemplateRows = '1fr';
            return;
          }

          const vw = viewport.clientWidth;
          const vh = viewport.clientHeight;
          if (!vw || !vh) return;

          const packed = chooseGrid(itemCount, vw, vh);
          grid.style.gridTemplateColumns = `repeat(${packed.cols}, minmax(0, 1fr))`;
          grid.style.gridTemplateRows = `repeat(${packed.rows}, minmax(0, 1fr))`;

          const cellHeight = vh / packed.rows;
          if (cellHeight < 54) {
            grid.classList.add('compact');
          } else {
            grid.classList.remove('compact');
          }
        }

        window.addEventListener('load', fitGallery);
        window.addEventListener('resize', fitGallery);
        setTimeout(fitGallery, 250);
      })();
    </script>
  </body>
</html>
