# Example domains.yml
# Map domain -> list of email recipients for per-domain notifications.
# The special key `default` will be used when a domain has no specific recipients.
# Keep this file private if it contains personal or internal addresses.

default:
  - ops@example.com

example.com:
  - alice@example.com
  - sec@example.com

# You can also omit this file and provide the same YAML via the DOMAINS_YML
# repository secret (raw YAML or base64-encoded). The workflows and scripts will
# prefer a checked-in domains.yml but will fall back to DOMAINS_YML when present.
